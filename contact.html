<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #f4f4f4;
        }

        .navbar {
            background-color: green;
            padding: 10px;
        }

        .navbar a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        .navbar a:hover {
            color: black;
        }

        .content {
            padding: 20px;
            max-width: 800px;
            margin: 20px auto;
            background: white;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: orange;
        }

        #successMsg {
            color: green;
            display: none;
            margin-top: 10px;
        }
    </style>

</head>
<body>

    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>

    <div class="content">
        <h1>Contact Me</h1>

        <form onsubmit="showMessage(event)">
            <label>Name:</label>
            <input type="text" placeholder="Enter your name" required>

            <label>Email:</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Message:</label>
            <textarea placeholder="Write your message" required></textarea>

            <button type="submit">Send</button>
        </form>

        <p id="successMsg">Message sent successfully ✅</p>
    </div>

    <script>
        function showMessage(event) {
            event.preventDefault(); // stop page refresh
            document.getElementById("successMsg").style.display = "block";
        }
    </script>

</body>
</html>
