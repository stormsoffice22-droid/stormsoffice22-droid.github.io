<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Storms Digital</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: Arial, sans-serif;
  background: #0b1a2f;
  color: white;
}

/* NAVBAR */
nav {
  background: black;
  padding: 15px;
  text-align: center;
}

nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

nav a:hover {
  color: orange;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
  animation: fadeIn 1.5s ease-in-out;
}

.hero h1 {
  font-size: 28px;
}

.hero p {
  margin: 15px 0;
  color: #ccc;
}

/* BUTTON */
.btn {
  display: inline-block;
  background: orange;
  color: black;
  padding: 10px 20px;
  text-decoration: none;
  border-radius: 5px;
  transition: 0.3s;
}

.btn:hover {
  background: #ffcc00;
  transform: scale(1.05);
}

/* SECTION */
.section {
  padding: 40px 20px;
  text-align: center;
}

/* GRID */
.grid {
  display: grid;
  gap: 20px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: #16243f;
  padding: 20px;
  border-radius: 10px;
  transition: 0.3s;
  animation: fadeUp 1s ease;
}

.card:hover {
  transform: translateY(-5px);
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Hi, I'm Storms 👋</h1>
  <p>I build simple and clean websites</p>
  <a href="contact.html" class="btn">Hire Me</a>
</div>

<!-- SERVICES -->
<div class="section">
  <h2>My Services</h2>

  <div class="grid">

    <div class="card">
      <h3>Website Design</h3>
      <p>I create clean and responsive websites.</p>
    </div>

    <div class="card">
      <h3>Contact Forms</h3>
      <p>I build forms that send messages directly to your email.</p>
    </div>

  </div>
</div>

<!-- PROJECTS -->
<div class="section">
  <h2>My Projects</h2>

  <div class="grid">

    <div class="card">
      <h3>Contact Form Website</h3>
      <p>A website with a working email form.</p>
    </div>

  </div>
</div>

</body>
</html>
